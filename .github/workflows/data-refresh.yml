name: Refresh NASA dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh raw archive snapshot
        run: pnpm run data:refresh

      - name: Rebuild generated dataset
        run: pnpm run data:build

      - name: Commit updated archive snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/raw/nasa-exoplanets-ps.csv src/generated/exoplanets-summary.json public/data/exoplanets-data.json; then
            echo "No data changes detected."
            exit 0
          fi
          git add data/raw/nasa-exoplanets-ps.csv src/generated/exoplanets-summary.json public/data/exoplanets-data.json
          git commit -m "chore(data): refresh NASA exoplanet archive"
          git push

