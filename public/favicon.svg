<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="exo-grad" x1="0" y1="0" x2="32" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow-inner" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Structure: Precision & Archiving -->
  <path d="M16 2L29 9V23L16 30L3 23V9L16 2Z" fill="#020617" />
  <path d="M16 2L29 9V23L16 30L3 23V9L16 2Z" stroke="url(#exo-grad)" stroke-width="2" stroke-linejoin="round" />
  
  <!-- Core Icon: The 'V' for Vault with atmospheric perspective -->
  <path d="M11 13L16 22L21 13" stroke="url(#exo-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-inner)" />
  
  <!-- Navigation Star: Discovery -->
  <circle cx="16" cy="9" r="1.2" fill="white">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Bottom Accent: Horizon -->
  <path d="M12 25C12 25 14 26 16 26C18 26 20 25 20 25" stroke="white" stroke-opacity="0.2" stroke-width="1" stroke-linecap="round" />
</svg>
